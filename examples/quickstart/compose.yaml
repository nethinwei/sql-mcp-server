services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quickstart
      POSTGRES_PASSWORD: quickstart
      POSTGRES_DB: quickstart
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickstart -d quickstart"]
      interval: 2s
      timeout: 5s
      retries: 15
    networks:
      quickstart:
        ipv4_address: 172.30.0.2

  mcp:
    image: ${SQL_MCP_IMAGE:-ghcr.io/nethinwei/sql-mcp-server:v0.1.5}
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: quickstart
      POSTGRES_PASSWORD: quickstart
      POSTGRES_DB: quickstart
    command: ["serve", "--config", "/config/config.yaml"]
    volumes:
      - ./config.yaml:/config/config.yaml:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      quickstart:
        ipv4_address: 172.30.0.3

networks:
  quickstart:
    ipam:
      config:
        - subnet: 172.30.0.0/24
