version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gocritic
    - misspell
    - depguard
  settings:
    # Core packages use stdlib + sibling core packages only, except config's
    # yaml.v3 dependency for presence-aware YAML decoding. No core package may
    # import x/; x/ depends on core, never the reverse.
    depguard:
      rules:
        core-purity:
          list-mode: strict
          files:
            - "relalg/**.go"
            - "codegen/**.go"
            - "entity/**.go"
            - "dialect/**.go"
            - "store/**.go"
            - "rbac/**.go"
            - "mask/**.go"
            - "cost/**.go"
            - "budget/**.go"
            - "audit/**.go"
            - "tool/**.go"
            - "cache/**.go"
            - "hook/**.go"
            - "ratelimit/**.go"
            - "engine/**.go"
            - "introspect/**.go"
          allow:
            - $gostd
            - github.com/nethinwei/sql-mcp-server
        config-yaml-presence:
          list-mode: strict
          files:
            - "config/**.go"
          allow:
            - $gostd
            - github.com/nethinwei/sql-mcp-server
            - gopkg.in/yaml.v3
    revive:
      rules:
        # Interface contracts are documented at the interface; requiring every
        # concrete method to repeat a doc comment is noise.
        - name: exported
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck, gocritic]

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
