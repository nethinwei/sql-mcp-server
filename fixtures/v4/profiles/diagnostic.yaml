# Generated by fixtures/v4/generator (seed=1 scale=1). Do not edit;
# run `make fixtures-v4` to regenerate.
audit:
    enabled: false
budget:
    roles:
        analyst:
            maxConcurrent: 16
            maxExecution: 10s
            maxReturnedBytes: 1048576
            maxReturnedRows: 200
            maxSessionCost: 10000000
cache:
    enabled: false
cost:
    enabled: true
    hardScore: 10
    maxBytes: 16777216
    maxRows: 5000
    queryTimeout: 10s
    rejectFullScan: false
    softScore: 20
    whitelistPKPoint: true
databases:
    primary:
        driver: postgres
        dsn: ${DATABASE_DSN}
entities:
    - datasource: primary
      description: Currencies; minor_unit_scale is the exponent between the minor unit stored in *_minor columns and the display unit (2 means 100 minor = 1 unit, 0 means minor = unit)
      fields:
        - description: Currency ID
          name: id
        - description: ISO currency code
          name: code
        - description: Currency name
          name: name
        - description: Decimal places between minor unit and display unit
          name: minor_unit_scale
      kind: table
      name: currencies
      primaryKey:
        - id
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_currencies
    - datasource: primary
      description: Countries and their sales region
      fields:
        - description: Country ID
          name: id
        - description: ISO country code
          name: code
        - description: Country name
          name: name
        - description: 'Sales region: amer | apac | emea'
          name: region
      kind: table
      name: countries
      primaryKey:
        - id
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_countries
    - datasource: primary
      description: Tenant organizations (business owners of applications)
      fields:
        - description: Organization ID
          name: id
        - description: Organization name
          name: name
        - description: Home country code
          name: country_code
        - description: Registration date
          name: created_at
      kind: table
      name: organizations
      primaryKey:
        - id
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_organizations
    - datasource: primary
      description: Applications (independently operated products under an organization); currency_code is the settlement currency of all money amounts of that application
      fields:
        - description: Application ID
          name: id
        - description: Owning organization ID
          name: organization_id
        - description: Application name
          name: name
        - description: Settlement currency of this application
          name: currency_code
        - description: live | paused
          name: status
      kind: table
      name: applications
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            organization_id: id
          name: organization
          target: organizations
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_applications
    - datasource: primary
      description: Platform login accounts (staff and operators); NOT the transacting customers — see the customers entity
      fields:
        - description: User ID
          name: id
        - description: Login email
          mask: email
          name: email
        - description: Display name
          name: display_name
        - description: Account creation date
          name: created_at
      kind: table
      name: users
      primaryKey:
        - id
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_users
    - datasource: primary
      description: Transacting customers of an organization; deleted_at marks logical deletion (excluded from active-customer counts)
      fields:
        - description: Customer ID
          name: id
        - description: Owning organization ID
          name: organization_id
        - description: Contact email (masked)
          mask: email
          name: email
        - description: Customer country code
          name: country_code
        - description: First-seen date
          name: created_at
        - description: Logical deletion time; NULL means active
          name: deleted_at
      kind: table
      name: customers
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            organization_id: id
          name: organization
          target: organizations
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_customers
    - datasource: primary
      description: Sellable products; current price lives in product_price_versions (never on this table)
      fields:
        - description: Product ID
          name: id
        - description: Selling application ID
          name: application_id
        - description: Product name
          name: name
        - description: one_time | subscription | gift_pack
          name: product_type
        - description: active | archived
          name: status
      kind: table
      name: products
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            application_id: id
          name: application
          target: applications
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_products
    - datasource: primary
      description: Versioned product prices in minor units; a version is valid for order dates in [valid_from, valid_to), open-ended when valid_to is NULL. Historical orders keep the price valid at order creation
      fields:
        - description: Price version ID
          name: id
        - description: Product ID
          name: product_id
        - description: Unit price in minor units of currency_code
          name: price_minor
        - description: Price currency (application settlement currency)
          name: currency_code
        - description: First day this version applies
          name: valid_from
        - description: First day this version no longer applies; NULL = current
          name: valid_to
      kind: table
      name: product_price_versions
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            product_id: id
          name: product
          target: products
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_product_price_versions
    - datasource: primary
      description: Business orders (transaction intent, NOT payment success); money in minor units of currency_code. created_at / confirmed_at / cancelled_at / completed_at are distinct lifecycle times
      fields:
        - description: Order ID
          name: id
        - description: Application ID
          name: application_id
        - description: Customer ID
          name: customer_id
        - description: created | confirmed | cancelled | completed
          name: status
        - description: Order currency (application settlement currency)
          name: currency_code
        - description: Order total in minor units (sum of items)
          name: total_minor
        - description: Order creation time (UTC)
          name: created_at
        - description: Confirmation time; NULL until confirmed
          name: confirmed_at
        - description: Cancellation time; NULL unless cancelled
          name: cancelled_at
        - description: Fulfilment completion time; NULL until completed
          name: completed_at
      kind: table
      name: orders
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            application_id: id
          name: application
          target: applications
        - cardinality: belongs-to
          joinOn:
            customer_id: id
          name: customer
          target: customers
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_orders
    - datasource: primary
      description: Order line items (one row per product in an order — finer grain than orders); unit_price_minor is the historical price at order creation
      fields:
        - description: Order item ID
          name: id
        - description: Order ID
          name: order_id
        - description: Product ID
          name: product_id
        - description: Quantity
          name: quantity
        - description: Unit price in minor units at order creation
          name: unit_price_minor
        - description: Item currency
          name: currency_code
      kind: table
      name: order_items
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            order_id: id
          name: order
          target: orders
        - cardinality: belongs-to
          joinOn:
            product_id: id
          name: product
          target: products
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_order_items
    - datasource: primary
      description: External payment channels (PSPs)
      fields:
        - description: Channel ID
          name: id
        - description: Channel name
          name: name
        - description: active | disabled
          name: status
      kind: table
      name: payment_channels
      primaryKey:
        - id
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_payment_channels
    - datasource: primary
      description: Versioned routing rules; a version applies to attempts whose created time falls in [valid_from, valid_to). Historical queries must use the version valid at attempt time
      fields:
        - description: Routing rule version ID
          name: id
        - description: Rule name
          name: rule_name
        - description: Routing strategy summary
          name: strategy
        - description: First day this version applies
          name: valid_from
        - description: First day this version no longer applies; NULL = current
          name: valid_to
      kind: table
      name: routing_rule_versions
      primaryKey:
        - id
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_routing_rule_versions
    - datasource: primary
      description: 'Payment intents: one business payment goal per order (NOT a single channel request — see payment_attempts). Intent success rate and attempt success rate are different metrics'
      fields:
        - description: Payment intent ID
          name: id
        - description: Order ID
          name: order_id
        - description: processing | succeeded
          name: status
        - description: Intent amount in minor units
          name: amount_minor
        - description: Channel fee in minor units of the succeeded attempt (0 while processing), per the fee rule version valid at payment time
          name: fee_minor
        - description: Intent currency
          name: currency_code
        - description: Channel of the final (succeeded) attempt; NULL while processing
          name: final_channel_id
        - description: Intent creation time
          name: created_at
        - description: Final success time; NULL while processing
          name: completed_at
      kind: table
      name: payment_intents
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            order_id: id
          name: order
          target: orders
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_payment_intents
    - datasource: primary
      description: 'Individual payment attempts: one intent can have several (failed attempts precede a retry on another channel). First-attempt result and final intent result differ'
      fields:
        - description: Attempt ID
          name: id
        - description: Payment intent ID
          name: intent_id
        - description: 1-based sequence within the intent
          name: attempt_no
        - description: Routed channel ID
          name: channel_id
        - description: failed | processing | succeeded
          name: status
        - description: Raw channel status string (channel-specific vocabulary)
          name: channel_status
        - description: Attempt amount in minor units
          name: amount_minor
        - description: Attempt creation time
          name: created_at
      kind: table
      name: payment_attempts
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            intent_id: id
          name: intent
          target: payment_intents
        - cardinality: belongs-to
          joinOn:
            channel_id: id
          name: channel
          target: payment_channels
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_payment_attempts
    - datasource: primary
      description: 'Routing decision per attempt: candidates, selected channel, the rule version in force at attempt time, and the reason'
      fields:
        - description: Decision ID
          name: id
        - description: Attempt ID
          name: attempt_id
        - description: Routing rule version in force at attempt time
          name: rule_version_id
        - description: Selected channel
          name: selected_channel_id
        - description: primary | retry_failover
          name: reason
      kind: table
      name: routing_decisions
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            attempt_id: id
          name: attempt
          target: payment_attempts
        - cardinality: belongs-to
          joinOn:
            rule_version_id: id
          name: rule_version
          target: routing_rule_versions
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_routing_decisions
    - datasource: primary
      description: Refunds against succeeded payment intents; partial refunds are common (amount below the intent amount)
      fields:
        - description: Refund ID
          name: id
        - description: Payment intent ID
          name: intent_id
        - description: full | partial
          name: kind
        - description: Refunded amount in minor units
          name: amount_minor
        - description: Refund currency
          name: currency_code
        - description: succeeded
          name: status
        - description: Refund creation time
          name: created_at
      kind: table
      name: refunds
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            intent_id: id
          name: intent
          target: payment_intents
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_refunds
    - datasource: primary
      description: 'Raw channel callback events: duplicates, delays, and out-of-order delivery all occur. external_event_id identifies the channel-side event; rows sharing it are duplicate deliveries. occurred_at (channel), received_at (gateway), processed_at (internal, NULL = received but not processed) are distinct times'
      fields:
        - description: Callback row ID
          name: id
        - description: Channel ID
          name: channel_id
        - description: Payment attempt ID
          name: attempt_id
        - description: Channel-side event ID (duplicate deliveries share it)
          name: external_event_id
        - description: payment_failed | payment_processing | payment_succeeded
          name: event_type
        - description: Event time on the channel side
          name: occurred_at
        - description: Time the gateway received this delivery
          name: received_at
        - description: Internal processing time; NULL = received but not yet processed
          name: processed_at
      kind: table
      name: channel_callbacks
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            attempt_id: id
          name: attempt
          target: payment_attempts
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_channel_callbacks
    - datasource: primary
      description: Internal ledger accounts (platform revenue, channel fee expense, merchant payable pools)
      fields:
        - description: Ledger account ID
          name: id
        - description: platform_revenue | channel_fee | merchant_payable
          name: account_type
        - description: Owner reference (org-N or platform)
          name: owner_ref
        - description: Account currency
          name: currency_code
      kind: table
      name: ledger_accounts
      primaryKey:
        - id
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_ledger_accounts
    - datasource: primary
      description: Versioned channel fee rules in basis points; a version applies to payments whose success time falls in [valid_from, valid_to). Recomputing history must use the version valid at payment time
      fields:
        - description: Fee rule version ID
          name: id
        - description: Channel ID
          name: channel_id
        - description: Fee in basis points (1/100 of a percent) of gross amount
          name: fee_bps
        - description: First day this version applies
          name: valid_from
        - description: First day this version no longer applies; NULL = current
          name: valid_to
      kind: table
      name: fee_rule_versions
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            channel_id: id
          name: channel
          target: payment_channels
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_fee_rule_versions
    - datasource: primary
      description: Ledger transactions (immutable posting units); entries of one transaction share its ID and balance to zero. A succeeded payment without a posted transaction has not reached the ledger yet
      fields:
        - description: Ledger transaction ID
          name: id
        - description: payment | refund
          name: source_type
        - description: ID in the source entity (payment intent or refund)
          name: source_id
        - description: posted
          name: status
        - description: Posting time
          name: posted_at
      kind: table
      name: ledger_transactions
      primaryKey:
        - id
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_ledger_transactions
    - datasource: primary
      description: 'Ledger entries: one debit/credit per row in minor units; direction is debit or credit; a transaction''s entries sum to zero per currency'
      fields:
        - description: Entry ID
          name: id
        - description: Ledger transaction ID
          name: transaction_id
        - description: Ledger account ID
          name: account_id
        - description: debit | credit
          name: direction
        - description: Entry amount in minor units (always positive; sign comes from direction)
          name: amount_minor
        - description: Entry currency
          name: currency_code
      kind: table
      name: ledger_entries
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            transaction_id: id
          name: transaction
          target: ledger_transactions
        - cardinality: belongs-to
          joinOn:
            account_id: id
          name: account
          target: ledger_accounts
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_ledger_entries
    - datasource: primary
      description: Settlements paid out to organizations; net_minor = gross - fees - refunds for the covered period. Settled is distinct from posted and from bank arrival
      fields:
        - description: Settlement ID
          name: id
        - description: Organization ID
          name: organization_id
        - description: Covered period start (inclusive)
          name: period_start
        - description: Covered period end (exclusive)
          name: period_end
        - description: Gross captured amount in minor units
          name: gross_minor
        - description: Channel fees in minor units
          name: fee_minor
        - description: Refunded amount in minor units
          name: refund_minor
        - description: Net paid out in minor units
          name: net_minor
        - description: Settlement currency
          name: currency_code
        - description: paid
          name: status
        - description: Payout execution time
          name: settled_at
      kind: table
      name: settlements
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            organization_id: id
          name: organization
          target: organizations
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_settlements
    - datasource: primary
      description: Line items from channel-issued statements (external side of reconciliation); amounts and references come from the channel and can disagree with internal records
      fields:
        - description: Statement item ID
          name: id
        - description: Channel ID
          name: channel_id
        - description: Channel-side transaction reference
          name: external_ref
        - description: Channel-reported amount in minor units
          name: amount_minor
        - description: Channel-reported currency
          name: currency_code
        - description: Statement date (channel timezone, date only)
          name: statement_date
      kind: table
      name: external_statement_items
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            channel_id: id
          name: channel
          target: payment_channels
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_external_statement_items
    - datasource: primary
      description: 'Reconciliation outcome per succeeded payment: matched, amount_mismatch, missing_external (internal success without a statement line), or missing_internal (statement line without internal record)'
      fields:
        - description: Reconciliation row ID
          name: id
        - description: Internal payment intent ID; NULL for missing_internal
          name: intent_id
        - description: External statement item ID; NULL for missing_external
          name: statement_item_id
        - description: matched | amount_mismatch | missing_external | missing_internal
          name: status
        - description: Internal minus external amount in minor units (0 when matched)
          name: difference_minor
        - description: Reconciliation run time
          name: checked_at
      kind: table
      name: reconciliation_results
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            intent_id: id
          name: intent
          target: payment_intents
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_reconciliation_results
    - datasource: primary
      description: Month-end account balance snapshots in minor units (a snapshot is a point-in-time fact, not a flow; recomputing from ledger_entries must agree)
      fields:
        - description: Snapshot ID
          name: id
        - description: Ledger account ID
          name: account_id
        - description: Snapshot date (balance as of end of that day, UTC)
          name: snapshot_date
        - description: Balance in minor units at the snapshot instant
          name: balance_minor
        - description: Account currency
          name: currency_code
      kind: table
      name: balance_snapshots
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            account_id: id
          name: account
          target: ledger_accounts
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_balance_snapshots
    - datasource: primary
      description: Creator agencies (guilds) taking a revenue share from signed creators
      fields:
        - description: Agency ID
          name: id
        - description: Agency name
          name: name
      kind: table
      name: agencies
      primaryKey:
        - id
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_agencies
    - datasource: primary
      description: Live streamers; agency_id NULL means independent (no agency share)
      fields:
        - description: Creator ID
          name: id
        - description: Public name
          name: display_name
        - description: Signing agency ID; NULL = independent
          name: agency_id
        - description: Agency signing date; NULL = independent
          name: signed_at
      kind: table
      name: creators
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            agency_id: id
          name: agency
          target: agencies
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_creators
    - datasource: primary
      description: Long-lived live rooms (a room hosts many sessions; room lifetime income != single-session income)
      fields:
        - description: Room ID
          name: id
        - description: Owning creator ID
          name: creator_id
        - description: Room title
          name: title
      kind: table
      name: live_rooms
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            creator_id: id
          name: creator
          target: creators
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_live_rooms
    - datasource: primary
      description: Individual broadcast sessions of a room (session grain is finer than room grain)
      fields:
        - description: Session ID
          name: id
        - description: Room ID
          name: room_id
        - description: Broadcast start
          name: started_at
        - description: Broadcast end
          name: ended_at
      kind: table
      name: live_sessions
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            room_id: id
          name: room
          target: live_rooms
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_live_sessions
    - datasource: primary
      description: Gift catalog; star prices are versioned in gift_price_versions (historical events keep the price at event time)
      fields:
        - description: Gift ID
          name: id
        - description: Gift name
          name: name
      kind: table
      name: gift_definitions
      primaryKey:
        - id
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_gift_definitions
    - datasource: primary
      description: Versioned gift prices in stars (virtual asset, not fiat); valid for event times in [valid_from, valid_to), NULL valid_to = current
      fields:
        - description: Price version ID
          name: id
        - description: Gift ID
          name: gift_id
        - description: Unit price in stars
          name: price_stars
        - description: First day this version applies
          name: valid_from
        - description: First day this version no longer applies; NULL = current
          name: valid_to
      kind: table
      name: gift_price_versions
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            gift_id: id
          name: gift
          target: gift_definitions
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_gift_price_versions
    - datasource: primary
      description: Versioned revenue share rules in basis points; splits must use the version valid at gift event time
      fields:
        - description: Share rule version ID
          name: id
        - description: Creator share of gift stars in basis points
          name: creator_bps
        - description: 'Agency share for signed creators in basis points (independent creators: 0)'
          name: agency_bps
        - description: First day this version applies
          name: valid_from
        - description: First day this version no longer applies; NULL = current
          name: valid_to
      kind: table
      name: revenue_share_rule_versions
      primaryKey:
        - id
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_revenue_share_rule_versions
    - datasource: primary
      description: Gift-sending events in sessions; NOT 1:1 with charges — charge_failed events consumed nothing, reversed events were charged then reversed, duplicate rows (dedup_of set) are repeat deliveries and must not be double counted
      fields:
        - description: Gift event row ID
          name: id
        - description: Live session ID
          name: session_id
        - description: Receiving creator ID
          name: creator_id
        - description: Gift ID
          name: gift_id
        - description: Gift count
          name: quantity
        - description: Stars charged (0 for charge_failed and duplicate rows)
          name: total_stars
        - description: processed | charge_failed | reversed | duplicate
          name: status
        - description: Original event row ID when this row is a duplicate delivery; NULL otherwise
          name: dedup_of
        - description: Event time
          name: occurred_at
      kind: table
      name: gift_events
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            session_id: id
          name: session
          target: live_sessions
        - cardinality: belongs-to
          joinOn:
            gift_id: id
          name: gift
          target: gift_definitions
        - cardinality: belongs-to
          joinOn:
            creator_id: id
          name: creator
          target: creators
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_gift_events
    - datasource: primary
      description: Revenue split per processed gift event in stars, using the share rule version valid at event time; platform_stars = total - creator - agency
      fields:
        - description: Split ID
          name: id
        - description: Gift event row ID
          name: gift_event_id
        - description: Receiving creator ID (denormalized from the event)
          name: creator_id
        - description: Share rule version applied
          name: rule_version_id
        - description: Creator share in stars
          name: creator_stars
        - description: Agency share in stars (0 for independent creators)
          name: agency_stars
        - description: Platform remainder in stars
          name: platform_stars
        - description: Gift event time (denormalized)
          name: occurred_at
      kind: table
      name: revenue_splits
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            gift_event_id: id
          name: gift_event
          target: gift_events
        - cardinality: belongs-to
          joinOn:
            creator_id: id
          name: creator
          target: creators
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_revenue_splits
    - datasource: primary
      description: Completed creator settlements in stars for a covered period; creator income after the period end is pending and NOT included
      fields:
        - description: Creator settlement ID
          name: id
        - description: Creator ID
          name: creator_id
        - description: Covered period start (inclusive)
          name: period_start
        - description: Covered period end (exclusive)
          name: period_end
        - description: Settled creator share in stars
          name: settled_stars
        - description: paid
          name: status
        - description: Settlement execution time
          name: settled_at
      kind: table
      name: creator_settlements
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            creator_id: id
          name: creator
          target: creators
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      schema: public
      source: wl_creator_settlements
    - datasource: primary
      description: Customers visible to the current tenant only; organization 1 is the diagnostic analyst's tenant
      fields:
        - description: Customer ID
          name: id
        - description: Owning organization ID
          name: organization_id
        - description: Contact email (masked)
          mask: email
          name: email
        - description: Customer country code
          name: country_code
        - description: First-seen date
          name: created_at
        - description: Logical deletion time; NULL means active
          name: deleted_at
      kind: table
      name: tenant_customers
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            organization_id: id
          name: organization
          target: organizations
      roles:
        aggregate:
            - analyst
        read:
            - analyst
      rowPolicies:
        analyst:
            field: organization_id
            op: eq
            value: 1
      schema: public
      source: wl_customers
    - datasource: primary
      description: Restricted audit records
      fields:
        - description: Customer ID
          name: id
        - description: Owning organization ID
          name: organization_id
        - description: Contact email (masked)
          name: email
        - description: Customer country code
          name: country_code
        - description: First-seen date
          name: created_at
        - description: Logical deletion time; NULL means active
          name: deleted_at
      kind: table
      name: internal_audit_log
      primaryKey:
        - id
      relationships:
        - cardinality: belongs-to
          joinOn:
            organization_id: id
          name: organization
          target: organizations
      roles:
        aggregate:
            - admin
        read:
            - admin
      schema: public
      source: wl_customers
server:
    role: analyst
    transport: stdio
tools:
    aggregateRecords: true
    describeEntities: true
    readRecords: true
version: "1"
