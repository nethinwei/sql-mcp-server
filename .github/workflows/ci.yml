name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  unit:
    name: build & test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25", "stable"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test -race ./...

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: test with coverage
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...
      - name: enforce >=85%
        run: |
          pct=$(go tool cover -func=coverage.txt | tail -1 | awk '{print $3}')
          num=${pct%.*}
          echo "total coverage: $pct"
          if [ "$num" -lt 85 ]; then echo "coverage $pct below 85%"; exit 1; fi
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.txt
          fail_ci_if_error: false

  # Integration and e2e jobs (testcontainers: PostgreSQL/MySQL/OceanBase) are
  # added once x/providers and x/mcpserver land (M3/M6).
  integration:
    name: integration (postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: integration tests (testcontainers)
        run: go test -race -tags=integration -timeout 15m ./x/providers/postgres/...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
