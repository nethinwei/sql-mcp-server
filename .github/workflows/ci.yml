name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - name: install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: golangci-lint
        run: make lint

  unit:
    name: build & test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25.12", "1.26.5"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: gofmt
        run: make fmt-check
      - name: go vet
        run: make vet
      - name: build
        run: make build
      - name: test
        run: make test

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - name: core coverage (>=80.0%)
        run: make coverage-check
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.txt
          fail_ci_if_error: false

  security-fuzz:
    name: security fuzz smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - name: bounded security fuzz targets
        run: make test-fuzz-smoke

  integration:
    name: integration (${{ matrix.db }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        db: [postgres, mysql, oceanbase]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - name: integration tests (testcontainers)
        run: make test-integration-${{ matrix.db }}

  e2e:
    name: e2e (mcp client)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - name: end-to-end tests (real DB + in-memory MCP client)
        run: make test-e2e

  protocol-smoke:
    name: protocol smoke (stdio + http)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - name: stdio and streamable HTTP protocol smoke
        run: make smoke-protocol

  modelscope:
    name: modelscope local listing
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - run: make modelscope-check

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          make govulncheck

  release-config:
    name: release snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - name: install actionlint v1.7.12
        run: |
          curl -fsSL \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz \
            | tar xz actionlint
      - run: make workflow-check ACTIONLINT=./actionlint
      - uses: anchore/sbom-action/download-syft@v0.24.0
        with:
          syft-version: v1.46.0
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --snapshot --clean --skip=publish,sign
      - name: verify checksums and targets
        run: scripts/release/verify-dist.sh dist

  registry-metadata:
    name: registry metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install MCP publisher v1.7.9
        run: |
          curl -fsSLO https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz
          curl -fsSLO https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/registry_1.7.9_checksums.txt
          sha256sum --check --ignore-missing registry_1.7.9_checksums.txt
          tar xzf mcp-publisher_linux_amd64.tar.gz mcp-publisher
      - run: make release-metadata-check MCP_PUBLISHER=./mcp-publisher RELEASE_VERSION=0.1.4
