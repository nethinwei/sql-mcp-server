name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: golangci-lint
        run: make lint

  unit:
    name: build & test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25", "stable"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: gofmt
        run: make fmt-check
      - name: go vet
        run: make vet
      - name: build
        run: make build
      - name: test
        run: make test

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: core coverage (>=80.0%)
        run: make coverage-check
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.txt
          fail_ci_if_error: false

  integration:
    name: integration (${{ matrix.db }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      matrix:
        db: [postgres, mysql, oceanbase]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: integration tests (testcontainers)
        run: make test-integration-${{ matrix.db }}

  e2e:
    name: e2e (mcp client)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: end-to-end tests (real DB + in-memory MCP client)
        run: make test-e2e

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          make govulncheck

  release-config:
    name: release snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - uses: anchore/sbom-action/download-syft@v0.24.0
        with:
          syft-version: v1.46.0
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --snapshot --clean --skip=publish,sign
      - name: verify checksums and targets
        run: |
          cd dist
          sha256sum --check checksums.txt
          test "$(ls sql-mcp-server_*_linux_*.tar.gz 2>/dev/null | wc -l)" -eq 2
          test "$(ls sql-mcp-server_*_darwin_*.tar.gz 2>/dev/null | wc -l)" -eq 2
          test "$(ls sql-mcp-server_*_windows_*.zip 2>/dev/null | wc -l)" -eq 2

  registry-metadata:
    name: registry metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: verify release metadata consistency
        run: |
          version=$(jq -r '.version' server.json)
          test "$version" = "0.1.3"
          test "$(jq -r '.packages[0].version' server.json)" = "$version"
          test "$(jq -r '.packages[0].identifier' server.json)" = \
            "ghcr.io/nethinwei/sql-mcp-server:$version"
      - name: install MCP publisher v1.7.9
        run: |
          curl -fsSLO https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz
          curl -fsSLO https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/registry_1.7.9_checksums.txt
          sha256sum --check --ignore-missing registry_1.7.9_checksums.txt
          tar xzf mcp-publisher_linux_amd64.tar.gz mcp-publisher
      - run: ./mcp-publisher validate server.json
